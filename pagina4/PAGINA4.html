<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="page-4.css">
    <title>Página 4</title>
    <style>
        * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    background-color: #f0f0f0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.principal {
    width: 80%;
    height: 95vh;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

header {
    height: 20%;
    background-color: #8e24aa;
    color: #adff2f;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 10px;
}

nav {
    height: 40px;
    background-color: #609696;
    border-radius: 10px;
}

.cuerpo {
    flex: 1;
    display: flex;
    gap: 10px;
}

main {
    flex: 2;
    background-color: #7ef9d0;
    padding: 10px;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

article {
    background-color: #b72b21;
    color: white;
    padding: 15px;
    border-radius: 10px;
    font-size: 0.8rem;
    height: 18%;
}

aside {
    flex: 1;
    background-color: #deb887;
    border-radius: 10px;
}

footer {
    height: 15%;
    background-color: #556b2f;
    border-radius: 10px;
}
    </style>
</head>
<body>
    <div class="principal">
        <header>
            <h1>Ejemplo maquetacion</h1>
        </header>

        <nav></nav>

        <div class="cuerpo">
            <main>
                <article>articulo 1</article>
                <article>articulo 2</article>
                <article>articulo 3</article>
                <article>articulo 4</article>
                <article>articulo 5</article>
            </main>

            <aside></aside>
        </div>

        <footer></footer>
    </div>
</body>
</html>
